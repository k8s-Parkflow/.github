name: "Reusable PR Title Formatter"

# 이 워크플로우를 다른 곳에서 호출할 수 있게 허용함
on:
  workflow_call:
    secrets:
      GHA_TOKEN: # 필요한 경우 토큰을 넘겨받을 수 있음
        required: false

jobs:
  format-title:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira Key and Update Title
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branchName = pr.head.ref;
            const currentTitle = pr.title;
            
            // 브랜치에서 지라 키 추출 (예: PROJ-123)
            const jiraKeyMatch = branchName.match(/[A-Z]+-[0-9]+/);
            
            if (jiraKeyMatch) {
              const jiraKey = jiraKeyMatch[0];
              const prefix = `[${jiraKey}]`;
              
              if (!currentTitle.includes(prefix)) {
                github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  title: `${prefix} ${currentTitle}`
                });
              }
            }
